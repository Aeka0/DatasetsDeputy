<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datasets Deputy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    .splash-container {
      position: relative;
      width: var(--splash-width, 1344px);
      height: var(--splash-height, 768px);
      overflow: hidden;
      border-radius: 14px;
    }
    .splash-bg {
      position: absolute;
      inset: 0;
      width: var(--splash-width, 1344px);
      height: var(--splash-height, 768px);
    }
    .splash-title {
      position: absolute;
      inset: 0;
      width: var(--splash-width, 1344px);
      height: var(--splash-height, 768px);
      opacity: 0;
      transform: translateY(5px);
      animation: titleFadeIn 800ms ease 200ms forwards;
    }
    @keyframes titleFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
  <script>
    const splashWidth = 1344;
    const splashHeight = 768;

    function applyPhysicalPixelSize() {
      const scaleFactor = window.devicePixelRatio || 1;
      document.documentElement.style.setProperty(
        "--splash-width",
        `${splashWidth / scaleFactor}px`
      );
      document.documentElement.style.setProperty(
        "--splash-height",
        `${splashHeight / scaleFactor}px`
      );
    }

    applyPhysicalPixelSize();
    window.addEventListener("resize", applyPhysicalPixelSize);
  </script>
</head>
<body>
  <div class="splash-container">
    <img class="splash-bg" src="/splash/SplashBG1.png" alt="" draggable="false" />
    <img class="splash-title" src="/splash/SplashTitle.png" alt="" draggable="false" />
  </div>
</body>
</html>
